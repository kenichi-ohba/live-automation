<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>プリセット設定 - FC2 Live Automation</title>
    <link rel="icon" th:href="@{/UpaLive_Icon.ico}" type="image/x-icon">
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 text-gray-800">
    
    <nav class="bg-blue-600 text-white p-4 shadow-md sticky top-0 z-50">
        <div class="container mx-auto flex justify-between items-center">
            <a th:href="@{/}" class="text-xl font-bold tracking-wider flex items-center">
                <img th:src="@{/UpaLive_Logo.png}" alt="Logo" class="h-8 w-8 mr-2 rounded bg-white p-0.5">
                UpaLive
            </a>
            <div class="space-x-6 text-sm font-bold">
                <a th:href="@{/}" class="text-blue-200 hover:text-white transition">ダッシュボード</a>
                <a th:href="@{/accounts}" class="text-blue-200 hover:text-white transition">アカウント(素材)管理</a>
            </div>
        </div>
    </nav>

    <div class="container mx-auto px-4 py-8 max-w-4xl">
        <h2 class="text-2xl font-bold text-gray-700 flex items-center mb-6">
            <span class="mr-2">📂</span> プリセットの登録・編集
        </h2>
        
        <form th:action="@{/presets/save}" th:object="${preset}" method="post" class="space-y-6">
            <input type="hidden" th:field="*{id}" />
            <input type="hidden" th:field="*{status}" />

            <div class="bg-white shadow-md rounded-lg p-6 border-l-4 border-indigo-500">
                <h3 class="text-xl font-bold mb-4 border-b pb-2 text-indigo-800">1. 基本情報</h3>
                <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                    <div>
                        <label class="block text-sm font-bold mb-1 text-indigo-900">プリセット名</label>
                        <input type="text" th:field="*{presetName}" class="w-full border rounded px-3 py-2 bg-white" placeholder="例: 夜の連続配信リスト" required>
                    </div>
                    <div>
                        <label class="block text-sm font-bold mb-1 text-indigo-900">ループ設定 (0で無限)</label>
                        <div class="flex items-center space-x-2">
                            <input type="number" th:field="*{loopCount}" class="w-32 border rounded px-3 py-2 text-center" min="0">
                            <span class="font-bold">回ループ</span>
                        </div>
                    </div>
                    <div class="md:col-span-2 bg-blue-50 p-4 rounded border border-blue-100">
                        <label class="flex items-center cursor-pointer">
                            <input type="checkbox" th:field="*{shuffleMode}" class="form-checkbox h-5 w-5 text-blue-600">
                            <span class="ml-2 font-bold text-blue-900">シャッフル再生モード (リストをランダムな順序で再生する)</span>
                        </label>
                    </div>
                </div>
            </div>

            <div class="bg-white shadow-md rounded-lg p-6 border-l-4 border-blue-500">
                <div class="flex justify-between items-center mb-4 border-b pb-2">
                    <h3 class="text-xl font-bold text-gray-700">2. 配信アカウントの選択</h3>
                    <span class="text-xs text-gray-500 font-bold" th:text="${#lists.size(allAccounts)} + ' 件の登録済みアカウント'"></span>
                </div>
                
                <p class="text-sm text-gray-600 mb-4">配信したい順序でチェックを入れてください。右側の数字が再生順になります。</p>

                <div class="max-h-[500px] overflow-y-auto pr-2 custom-scrollbar border rounded bg-gray-50">
                    <div class="divide-y divide-gray-200">
                        <div th:each="account : ${allAccounts}" class="flex items-center p-3 hover:bg-blue-50 transition cursor-pointer">
                            <label class="flex items-center w-full cursor-pointer">
                                <input type="checkbox" name="selectedAccountIds" th:value="${account.id}" 
                                       th:checked="${#lists.contains(selectedAccountIds, account.id)}"
                                       class="form-checkbox h-6 w-6 text-blue-500 rounded border-gray-300">
                                <div class="ml-4 flex-grow">
                                    <div class="font-bold text-gray-800" th:text="${account.accountName}">アカウント名</div>
                                    <div class="text-[10px] text-gray-500 font-mono truncate w-64 md:w-full" th:text="${account.videoPath}">動画パス</div>
                                </div>
                                <div class="ml-2">
                                    <span class="text-xs px-2 py-1 bg-gray-200 rounded text-gray-600 font-bold" th:text="${account.videoDuration}">30分</span>
                                </div>
                            </label>
                        </div>
                    </div>
                </div>
                <p class="text-xs text-red-500 mt-2 font-bold">※何も選択しない場合はプリセットを保存できません。</p>
            </div>

            <div class="bg-white shadow-md rounded-lg p-6 border-l-4 border-yellow-500">
                <h3 class="text-xl font-bold mb-4 border-b pb-2 text-gray-700">3. インターバル設定</h3>
                <div>
                    <label class="block text-sm font-bold mb-1">配信終了後の待機時間 (分)</label>
                    <div class="flex items-center space-x-2">
                        <input type="number" th:field="*{loopWaitMinutes}" class="w-32 border rounded px-3 py-2 text-center" min="0">
                        <span class="font-bold">分間休憩する</span>
                    </div>
                    <p class="text-xs text-gray-500 mt-2">※次のアカウントの配信を開始するまでのインターバルを指定します。</p>
                </div>
            </div>

            <div class="flex justify-center space-x-4 pt-4 pb-8">
                <a th:href="@{/}" class="bg-gray-500 hover:bg-gray-600 text-white font-bold py-3 px-8 rounded-full shadow transition duration-200">
                    キャンセル
                </a>
                <button type="submit" class="bg-blue-600 hover:bg-blue-700 text-white font-bold py-3 px-12 rounded-full shadow-lg text-lg transition duration-200">
                    プリセットを保存する
                </button>
            </div>
        </form>
    </div>

    <style>
        /* スクロールバーのデザインを少し細く綺麗にする */
        .custom-scrollbar::-webkit-scrollbar { width: 6px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: #f1f1f1; border-radius: 10px; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
        .custom-scrollbar::-webkit-scrollbar-thumb:hover { background: #94a3b8; }
    </style>
</body>
</html>
