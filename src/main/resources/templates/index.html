<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>UpaLive - FC2配信自動化ダッシュボード</title>
    <link rel="icon" th:href="@{/UpaLive_Icon.ico}" type="image/x-icon">
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .custom-scrollbar::-webkit-scrollbar { width: 6px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: #f1f1f1; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
        .log-container { height: 300px; }
    </style>
</head>
<body class="bg-gray-100 text-gray-800">
    
    <nav class="bg-blue-600 text-white p-4 shadow-md sticky top-0 z-50">
        <div class="container mx-auto flex justify-between items-center">
            <a th:href="@{/}" class="text-xl font-bold tracking-wider flex items-center">
                <img th:src="@{/UpaLive_Logo.png}" alt="Logo" class="h-8 w-8 mr-2 rounded bg-white p-0.5">
                UpaLive
            </a>
            <div class="space-x-6 text-sm font-bold">
                <a th:href="@{/}" class="border-b-2 border-white pb-1">ダッシュボード</a>
                <a th:href="@{/accounts}" class="text-blue-200 hover:text-white transition">アカウント(素材)管理</a>
            </div>
        </div>
    </nav>

    <div class="container mx-auto px-4 py-6">

        <div class="bg-white p-6 rounded-lg shadow-lg mb-8 border-l-8 border-red-600 flex flex-col md:flex-row justify-between items-center">
            <div class="mb-4 md:mb-0">
                <h2 class="text-xl font-bold text-red-700 flex items-center">
                    <span class="text-2xl mr-2">⚠️</span> システムの完全終了
                </h2>
                <p class="text-sm text-gray-600 font-bold mt-1">配信を停止し、ブラウザを閉じ、このアプリ自体を終了します。</p>
            </div>
            <button onclick="confirmAppExit()" class="bg-red-600 hover:bg-red-700 text-white font-black py-4 px-10 rounded-full shadow-2xl transition-all transform hover:scale-105 active:scale-95 text-lg flex items-center border-4 border-red-200">
                <span class="mr-3 text-2xl">🛑</span> アプリを完全に閉じる
            </button>
        </div>
        
        <div th:if="${message}" class="bg-green-100 border-l-4 border-green-500 text-green-700 p-4 mb-6 rounded shadow-sm font-bold" th:text="${message}"></div>

        <div class="flex justify-between items-center mb-6">
            <h2 class="text-2xl font-bold text-gray-700 flex items-center">
                <span class="mr-2">📂</span> プリセット管理
            </h2>
            <a th:href="@{/presets/add}" class="bg-indigo-600 hover:bg-indigo-700 text-white font-bold py-2 px-5 rounded-full shadow transition text-sm">＋ 新規プリセット作成</a>
        </div>

        <div class="bg-white rounded-lg shadow mb-10 overflow-hidden">
            <table class="min-w-full leading-normal">
                <thead>
                    <tr class="bg-indigo-50 text-indigo-700 text-sm font-bold border-b border-indigo-100">
                        <th class="py-3 px-6 text-left">プリセット名</th>
                        <th class="py-3 px-6 text-center">アカウント数</th>
                        <th class="py-3 px-6 text-center">設定</th>
                        <th class="py-3 px-6 text-center">操作</th>
                    </tr>
                </thead>
                <tbody class="text-gray-600 text-sm">
                    <tr th:each="preset : ${presets}" class="border-b border-gray-100 hover:bg-gray-50">
                        <td class="py-4 px-6"><div class="font-bold text-gray-800" th:text="${preset.presetName}"></div></td>
                        <td class="py-4 px-6 text-center"><span class="bg-gray-200 text-gray-700 px-3 py-1 rounded-full font-bold" th:text="${#lists.size(preset.accounts)} + ' 件'"></span></td>
                        <td class="py-4 px-6 text-center">
                            <div class="text-xs" th:text="${preset.loopCount == 0 ? '♾ 無限' : preset.loopCount + '回'}"></div>
                            <span th:if="${preset.shuffleMode}" class="text-[10px] text-yellow-600 font-bold">🔀 シャッフル</span>
                        </td>
                        <td class="py-4 px-6 text-center">
                            <div class="flex justify-center space-x-2">
                                <a th:href="@{/presets/start/{id}(id=${preset.id})}" class="bg-green-500 hover:bg-green-600 text-white font-bold py-1.5 px-4 rounded text-xs shadow">▶️ 再生</a>
                                <a th:href="@{/presets/stop/{id}(id=${preset.id})}" class="bg-red-500 hover:bg-red-600 text-white font-bold py-1.5 px-4 rounded text-xs shadow">⏹ 停止</a>
                                <a th:href="@{/presets/edit/{id}(id=${preset.id})}" class="text-blue-500 hover:text-blue-700 font-bold text-xs flex items-center ml-2">✏️</a>
                                <a th:href="@{/presets/delete/{id}(id=${preset.id})}" class="text-red-400 hover:text-red-600 font-bold text-xs flex items-center" onclick="return confirm('削除しますか？');">🗑️</a>
                            </div>
                        </td>
                    </tr>
                </tbody>
            </table>
        </div>

        <h2 class="text-xl font-bold text-gray-700 flex items-center mb-4">
            <span class="mr-2">📝</span> リアルタイム稼働状況
        </h2>
        <div id="logArea" class="bg-gray-900 text-green-400 p-4 rounded-lg shadow-inner font-mono text-xs log-container overflow-y-auto custom-scrollbar border-4 border-gray-800">
            <div id="logContent" class="space-y-1"></div>
        </div>
    </div>

    <script>
        function confirmAppExit() {
            const confirmed = confirm(
                "【確認】UpaLiveを完全に終了しますか？\n\n" +
                "・配信中のすべての動画が止まります。\n" +
                "・このアプリ自体も閉じられます。\n\n" +
                "再度使用するには、デスクトップのアイコンから再起動が必要です。"
            );
            if (confirmed) {
                // 終了メッセージを表示してから遷移
                document.body.innerHTML = `
                    <div class="flex h-screen items-center justify-center bg-gray-900 text-white text-center">
                        <div>
                            <h1 class="text-4xl font-bold mb-4">🛑 システム終了中</h1>
                            <p class="text-xl text-gray-400">すべての配信を停止し、アプリを閉じています...<br>この画面を閉じて、しばらくお待ちください。</p>
                        </div>
                    </div>
                `;
                window.location.href = "/stop-all";
            }
        }

        function fetchLogs() {
            fetch('/api/logs').then(r => r.json()).then(data => {
                const logContent = document.getElementById('logContent');
                const logArea = document.getElementById('logArea');
                logContent.innerHTML = data.map(log => `<div class="${log.includes('❌')?'text-red-400':log.includes('✅')?'text-blue-400':log.includes('🛑')?'text-red-500 font-bold':''}">${log}</div>`).join('');
                logArea.scrollTop = logArea.scrollHeight;
            });
        }
        setInterval(fetchLogs, 3000);
        fetchLogs();
    </script>
</body>
</html>
