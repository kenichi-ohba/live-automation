spring.application.name=fc2-live-automation

server.port=8082

spring.datasource.url=jdbc:h2:file:./data/fc2_automation_v2
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=update

# 現在のログ出力先ファイル
logging.file.name=logs/upalive.log
# 日ごと（1日単位）にローテーションする際のファイル名ルール
logging.logback.rollingpolicy.file-name-pattern=logs/upalive-%d{yyyy-MM-dd}.log
# 過去何日分のログを保持するか（5日分。それ以前は自動削除）
logging.logback.rollingpolicy.max-history=5