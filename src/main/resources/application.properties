spring.application.name=fc2-live-automation

server.port=8082

spring.datasource.url=jdbc:h2:file:./data/fc2_automation_v2
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=update

# ===============================
# 🌟 ログ出力・ローテーション設定
# ===============================
logging.file.name = logs/upalive.log
logging.logback.rollingpolicy.file-name-pattern = logs/upalive-%d{yyyy-MM-dd}.%i.log
logging.logback.rollingpolicy.max-history = 5